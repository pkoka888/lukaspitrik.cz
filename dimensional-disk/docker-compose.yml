# Docker Compose for lukaspitrik.cz
# Usage: docker-compose up -d

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

