name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dimensional-disk/package-lock.json
      
      - name: Install dependencies
        run: |
          cd dimensional-disk
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd dimensional-disk
          npx playwright install --with-deps chromium firefox
      
      - name: Run type checking
        run: |
          cd dimensional-disk
          npm run lint
        continue-on-error: true
      
      - name: Run Vitest tests
        run: |
          cd dimensional-disk
          npx vitest run
      
      - name: Run Playwright tests
        run: |
          cd dimensional-disk
          npx playwright test
      
      - name: Build production
        run: |
          cd dimensional-disk
          npm run build
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dimensional-disk/dist
